version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: cron
      cronjob: "17 3 14 * *"
      timezone: Europe/Berlin
    cooldown:
      default: 7
    open-pull-requests-limit: 15
    assignees:
      - BenAhrdt
    versioning-strategy: increase
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: cron
      cronjob: "43 3 14 * *"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - BenAhrdt
